name: test

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      reason:
        description: "触发原因（可选）"
        required: false
        type: string
        default: "Github Actions 页面手动触发"

env:
  WORKFLOW_NAME: ${{ github.workflow }}
  RUN_URL: https://github.com/${{ github.repository }}/
  # Node/Bun 等使用 libc 本地时区；裸 dayjs() 的「本地」与此一致
  TZ: Asia/Shanghai

jobs:
  run:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 安装 Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 安装依赖
        run: bun install --frozen-lockfile

      - name: 运行任务
        run: bun run index.ts
